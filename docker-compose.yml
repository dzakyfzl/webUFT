services:
  backend:
    build:
      context: ./Backend
    container_name: uft_backend
    env_file:
      - ./.env
    environment:
      APP_ENV: production
      DEBUG: "false"
      STORAGE_DIR: /app/storage
      MODULE_STORAGE_DIR: /app/storage/modules
      PUBLIC_FILE_BASE_URL: /static/modules
    volumes:
      - backend_storage:/app/storage
    expose:
      - "8000"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=5).read()\"",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped
    networks:
      - caddy_net

  frontend:
    build:
      context: ./frontend
    container_name: uft_frontend
    env_file:
      - path: ./frontend/.env
        required: false
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - caddy_net

volumes:
  backend_storage:

networks:
  caddy_net:
    external: true