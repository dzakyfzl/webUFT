events { }

http {
    limit_req_zone $binary_remote_addr zone=addr:10m rate=20r/s;
    server {
        
        listen 80;
        server_name ukmfotografitelkom.com www.ukmfotografitelkom.com;

        location / {
            limit_req zone=addr burst=20 nodelay;
            proxy_pass http://uft_frontend:3000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }

        location /api/ {
            client_max_body_size 100M;
            limit_req zone=addr burst=20 nodelay;
            if ($request_method = OPTIONS) {
                add_header Access-Control-Allow-Origin "*";
                add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS";
                add_header Access-Control-Allow-Headers "*";
                add_header Access-Control-Max-Age 86400;
                return 204;
            }
            proxy_pass http://uft_backend:8000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            add_header Access-Control-Allow-Origin "*" always;
        }
    }
}
